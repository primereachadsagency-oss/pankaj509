<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAJ Official</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#050505;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* Background Glow */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    left:-180px;
    top:-100px;
    background:radial-gradient(circle,#c58c1a,transparent 70%);
    filter:blur(80px);
    opacity:.35;
    animation:moveGlow1 8s ease-in-out infinite;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    right:-180px;
    bottom:-100px;
    background:radial-gradient(circle,#ffcb30,transparent 70%);
    filter:blur(80px);
    opacity:.25;
    animation:moveGlow2 10s ease-in-out infinite;
}

@keyframes moveGlow1{
    50%{
        transform:translate(50px,-30px) scale(1.1);
    }
}

@keyframes moveGlow2{
    50%{
        transform:translate(-50px,30px) scale(1.1);
    }
}

.container{
    width:100%;
    max-width:700px;
    text-align:center;
    padding:30px 20px;
    position:relative;
    z-index:10;
    animation:fadeUp .8s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Profile */

.profile{
    width:95px;
    height:95px;
    margin:auto;
    border-radius:50%;
    padding:3px;

    background:linear-gradient(
        135deg,
        #fff4c7,
        #d4a437
    );

    animation:
        floatLogo 4s ease-in-out infinite,
        glowLogo 3s ease-in-out infinite;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
    border:3px solid #000;
}

@keyframes floatLogo{
    50%{
        transform:translateY(-8px);
    }
}

@keyframes glowLogo{
    0%,100%{
        box-shadow:
        0 0 15px rgba(255,203,48,.4),
        0 0 35px rgba(255,203,48,.2);
    }

    50%{
        box-shadow:
        0 0 25px rgba(255,203,48,.9),
        0 0 60px rgba(255,203,48,.5);
    }
}

/* Title */

h1{
    margin-top:20px;
    font-family:'Cinzel',serif;
    font-size:52px;
    text-transform:uppercase;

    background:linear-gradient(
        to bottom,
        #fff7da,
        #f4dd8c,
        #c58c1a
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    position:relative;
    display:inline-block;
}

h1::after{
    content:"";
    position:absolute;
    top:0;
    left:-150%;
    width:60%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.8),
        transparent
    );

    transform:skewX(-20deg);

    animation:shine 4s linear infinite;
}

@keyframes shine{
    100%{
        left:250%;
    }
}

.subtitle{
    color:#cfcfcf;
    margin-top:10px;
    font-size:13px;
    letter-spacing:4px;
    font-weight:600;
}

/* Card */

.card{
    width:100%;
    max-width:500px;
    margin:35px auto;

    padding:28px;

    border-radius:24px;

    background:rgba(255,255,255,.03);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(10px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.5),
    0 0 20px rgba(255,203,48,.08);

    animation:cardFloat 6s ease-in-out infinite;
}

@keyframes cardFloat{
    50%{
        transform:translateY(-8px);
    }
}

.card p{
    color:white;
    font-size:16px;
    line-height:1.6;
    margin-bottom:20px;
}

.card strong{
    font-weight:700;
}

.stats{
    display:flex;
    justify-content:space-between;
    border-top:1px solid rgba(255,255,255,.08);
    padding-top:18px;
}

.stat h3{
    color:#ffcb30;
    font-size:24px;

    animation:statGlow 2s ease-in-out infinite;
}

@keyframes statGlow{
    50%{
        text-shadow:
        0 0 10px #ffcb30,
        0 0 20px #ffcb30;
    }
}

.stat span{
    color:#9e9e9e;
    font-size:11px;
    letter-spacing:1px;
}

/* Button */

.cta{
    width:400px;
    max-width:90%;
    height:75px;

    margin:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    text-decoration:none;

    font-size:20px;
    font-weight:700;
    color:#111;

    border-radius:50px;

    position:relative;
    overflow:hidden;

    background:linear-gradient(
        120deg,
        #fff4c7,
        #d4a437,
        #fff4c7
    );

    box-shadow:
    0 0 25px rgba(255,203,48,.4),
    0 0 60px rgba(255,203,48,.2);

    animation:buttonPulse 3s ease-in-out infinite;

    transition:.3s;
}

.cta:hover{
    transform:translateY(-3px) scale(1.02);
}

.cta::before{
    content:"";
    position:absolute;
    top:0;
    left:-150%;
    width:60%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.9),
        transparent
    );

    transform:skewX(-25deg);

    animation:buttonShine 3s linear infinite;
}

@keyframes buttonShine{
    100%{
        left:250%;
    }
}

@keyframes buttonPulse{

    50%{
        box-shadow:
        0 0 40px rgba(255,203,48,.8),
        0 0 90px rgba(255,203,48,.3);
    }
}

/* Footer */

.footer{
    margin-top:20px;
    font-size:12px;
    letter-spacing:2px;
    color:#7f7f7f;
}

.agency{
    margin-top:10px;
    color:white;
}

.agency span{
    color:#ffcb30;
    font-weight:700;
}

/* Mobile */

@media(max-width:768px){

    h1{
        font-size:34px;
    }

    .card{
        max-width:100%;
        padding:20px;
    }

    .stats{
        gap:10px;
    }

    .stat h3{
        font-size:18px;
    }

    .cta{
        height:65px;
        font-size:16px;
    }
}

</style>

<div class="container">

            <div class="stat">
